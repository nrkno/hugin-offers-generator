<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hugin Offers Generator</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #7ba8ee;
    color: #2f61b9;
    text-align: center;
    margin: 0;
    padding: 0;
    height: 100vh; 
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    overflow: hidden; 
  }
  #app-container {
    width: 100%;
    max-width: 600px;
    max-height: 96vh; 
    display: flex;
    flex-direction: column;
    background: #ffffff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 12px 32px rgba(47, 97, 185, 0.3);
    box-sizing: border-box;
  }
  h1 {
    margin-top: 0;
    margin-bottom: 5px;
    font-size: 26px;
    color: #cd2670;
  }
  .instructions { 
    color: #73bfa9;
    font-size: 15px; 
    font-weight: bold;
    margin-top: 0;
    margin-bottom: 10px; 
  }
  #controls-panel {
    display: none; 
    background: #2f61b9;
    padding: 10px 15px;
    border-radius: 8px;
    margin-top: 10px;
    margin-bottom: 10px;
    box-shadow: inset 0 4px 8px rgba(0,0,0,0.2);
  }
  .slider-group {
    display: flex;
    align-items: center;
    margin: 5px 0;
  }
  .slider-group label {
    font-weight: bold;
    width: 80px;
    text-align: left;
    font-size: 14px;
    color: #ffffff;
  }
  .slider-group input[type="range"] {
    flex-grow: 1;
    margin: 0 15px;
    cursor: pointer;
    accent-color: #fbe13c;
  }
  #svg-container {
    margin: 10px 0;
    flex: 1; 
    min-height: 0; 
    display: flex;
    justify-content: center;
    align-items: center;
    background: transparent;
  }
  
  svg {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    background-color: transparent;
    background-image: linear-gradient(45deg, #f0f0f0 25%, transparent 25%, transparent 75%, #f0f0f0 75%, #f0f0f0), 
                      linear-gradient(45deg, #f0f0f0 25%, transparent 25%, transparent 75%, #f0f0f0 75%, #f0f0f0);
    background-size: 20px 20px;
    background-position: 0 0, 10px 10px;
    border-radius: 8px;
    border: 2px solid #7ba8ee;
    box-sizing: border-box;
    aspect-ratio: 1 / 1; 
  }
  input[type="file"], button {
    background: #cd2670;
    color: #ffffff;
    border: none;
    padding: 12px 20px;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    font-weight: bold;
    margin-top: auto; 
    transition: background 0.2s ease;
  }
  button:hover, input[type="file"]:hover {
    background: #73bfa9;
  }
</style>
</head>

  <button id="download-btn">Download Emote</button>

<script>
  const uploadInput = document.getElementById('image-upload');
  const adLayer = document.getElementById('ad-stuff-layer');
  const svgElement = document.getElementById('hugin-emote');
  const downloadBtn = document.getElementById('download-btn');
  const controlsPanel = document.getElementById('controls-panel');
  const scaleSlider = document.getElementById('scale-slider');
  const rotateSlider = document.getElementById('rotate-slider');
  
  let uploadedImage = null;
  let isDragging = false;
  let startX, startY;
  
  let baseWidth = 0, baseHeight = 0;
  let currentX = 0, currentY = 0;
  let currentScale = 1;
  let currentRotation = 0;

  uploadInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (event) => {
      const dataUrl = event.target.result;
      adLayer.innerHTML = ''; 
      
      const tempImg = new Image();
      tempImg.onload = () => {
        uploadedImage = document.createElementNS('http://www.w3.org/2000/svg', 'image');
        uploadedImage.setAttribute('href', dataUrl);
        uploadedImage.setAttributeNS('http://www.w3.org/1999/xlink', 'xlink:href', dataUrl);
        
        const scale = Math.min(800 / tempImg.width, 800 / tempImg.height);
        baseWidth = tempImg.width * scale;
        baseHeight = tempImg.height * scale;
        
        currentScale = 1;
        currentRotation = 0;
        currentX = (2000 - baseWidth) / 2; 
        currentY = (2000 - baseHeight) / 2;
        
        scaleSlider.value = 1;
        rotateSlider.value = 0;
        controlsPanel.style.display = 'block';
        
        uploadedImage.setAttribute('cursor', 'grab');
        adLayer.appendChild(uploadedImage);
        
        applyTransforms();
        
        uploadedImage.addEventListener('mousedown', startDrag);
        uploadedImage.addEventListener('touchstart', startDrag, {passive: false});
        uploadedImage.addEventListener('wheel', handleScrollResize, {passive: false});
      };
      tempImg.src = dataUrl;
    };
    reader.readAsDataURL(file);
  });

  function applyTransforms() {
    if (!uploadedImage) return;
    
    const w = baseWidth * currentScale;
    const h = baseHeight * currentScale;
    
    uploadedImage.setAttribute('width', w);
    uploadedImage.setAttribute('height', h);
    uploadedImage.setAttribute('x', currentX);
    uploadedImage.setAttribute('y', currentY);
    
    const centerX = currentX + (w / 2);
    const centerY = currentY + (h / 2);
    uploadedImage.setAttribute('transform', `rotate(${currentRotation}, ${centerX}, ${centerY})`);
  }

  function updateScale(newScale) {
    const oldW = baseWidth * currentScale;
    const oldH = baseHeight * currentScale;
    
    currentScale = parseFloat(newScale);
    scaleSlider.value = currentScale;
    
    const newW = baseWidth * currentScale;
    const newH = baseHeight * currentScale;

    currentX -= (newW - oldW) / 2;
    currentY -= (newH - oldH) / 2;
    
    applyTransforms();
  }

  scaleSlider.addEventListener('input', (e) => updateScale(e.target.value));
  rotateSlider.addEventListener('input', (e) => {
    currentRotation = parseFloat(e.target.value);
    applyTransforms();
  });

  function handleScrollResize(e) {
    e.preventDefault(); 
    const zoomStep = 0.05;
    let newScale = currentScale;
    if (e.deltaY > 0) {
        newScale = Math.max(0.1, currentScale - zoomStep);// Zoom out
    } else {
        newScale = Math.min(3, currentScale + zoomStep);// Zoom in
    }
    updateScale(newScale);
  }

  function startDrag(e) {
    e.preventDefault();
    isDragging = true;
    uploadedImage.setAttribute('cursor', 'grabbing');
    
    const pt = getMousePosition(e);
    startX = pt.x - currentX;
    startY = pt.y - currentY;

    window.addEventListener('mousemove', drag);
    window.addEventListener('touchmove', drag, {passive: false});
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchend', endDrag);
  }

  function drag(e) {
    if (!isDragging) return;
    e.preventDefault();
    const pt = getMousePosition(e);
    currentX = pt.x - startX;
    currentY = pt.y - startY;
    applyTransforms();
  }

  function endDrag() {
    isDragging = false;
    uploadedImage.setAttribute('cursor', 'grab');
    window.removeEventListener('mousemove', drag);
    window.removeEventListener('touchmove', drag);
    window.removeEventListener('mouseup', endDrag);
    window.removeEventListener('touchend', endDrag);
  }

  function getMousePosition(evt) {
    const CTM = svgElement.getScreenCTM();
    let clientX = evt.clientX;
    let clientY = evt.clientY;
    if (evt.touches && evt.touches.length > 0) {
      clientX = evt.touches[0].clientX;
      clientY = evt.touches[0].clientY;
    }
    return {
      x: (clientX - CTM.e) / CTM.a,
      y: (clientY - CTM.f) / CTM.d
    };
  }

  downloadBtn.addEventListener('click', () => {
    const serializer = new XMLSerializer();
    const svgString = serializer.serializeToString(svgElement);
    const blob = new Blob([svgString], {type: 'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(blob);

    const width = 1000;
    const height = 1000;

    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);

      const a = document.createElement('a');
      a.download = 'Hugin-Offer.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
      
      URL.revokeObjectURL(url);
    };
    img.src = url;
  });
</script>
